<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Axon">
  <!-- Editorial identity: ink ground, aged-paper letterform, corrector-red crossbar -->
  <rect width="100" height="100" rx="16" fill="#1a1612"/>
  <!-- Serif "A": two legs in paper -->
  <g fill="none" stroke="#f4efe6" stroke-width="9" stroke-linejoin="round" stroke-linecap="round">
    <path d="M30 77 L50 25 L70 77"/>
  </g>
  <!-- Crossbar in editorial corrector red (the brand accent) -->
  <path d="M38.5 59 L61.5 59" fill="none" stroke="#b8302b" stroke-width="8" stroke-linecap="round"/>
  <!-- Subtle serif feet -->
  <g fill="none" stroke="#f4efe6" stroke-width="6" stroke-linecap="round">
    <path d="M22 79 L39 79"/>
    <path d="M61 79 L78 79"/>
  </g>
</svg>
